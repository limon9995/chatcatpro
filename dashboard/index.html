<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dashboard</title>
    <script>
      (function () {
        // Auto-reload on script load failure (common during redeploys)
        window.addEventListener('error', function (e) {
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            console.warn('Asset load failed, checking for updates...', e.target.src || e.target.href);
            var lastReload = sessionStorage.getItem('last_asset_reload') || 0;
            var now = Date.now();
            if (now - lastReload > 10000) {
              sessionStorage.setItem('last_asset_reload', now);
              window.location.reload();
            }
          }
        }, true);

        try {
          var path = String(window.location.pathname || '/');
          var normalized = path
            .replace(/\/+(null|undefined)(?=\/|$)/gi, '')
            .replace(/\/{2,}/g, '/');
          if (!normalized || normalized === '') normalized = '/';
          if (!normalized.startsWith('/')) normalized = '/' + normalized;
          if (normalized !== path) {
            var next = normalized + window.location.search + window.location.hash;
            window.history.replaceState({}, '', next);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body style="margin:0; background:#06060a;">
    <div id="root">
      <div id="initial-loading" style="height:100vh; display:flex; align-items:center; justify-content:center; color:#fff; font-family:system-ui; flex-direction:column; gap:10px;">
        <div style="font-size:32px; opacity:0.2;">⬡</div>
        <div style="font-size:12px; opacity:0.3;">লোড হচ্ছে...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loading indicator once React mounts
      const observer = new MutationObserver((mutations) => {
        const loading = document.getElementById('initial-loading');
        if (loading && document.getElementById('root').children.length > 1) {
          loading.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
